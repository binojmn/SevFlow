image:
  repository: "696155685144.dkr.ecr.us-east-1.amazonaws.com/sevflow-app"
  tag: "0301cd10db04098feb1cad8898b1c8451f1c34a7"
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

env:
  appEnv: prod
  appVersion: "1.0.0"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-http
  host: app.sevflow.app
  path: /
  pathType: Prefix
  tls:
    - hosts:
        - app.sevflow.app
      secretName: app-sevflow-app-tls

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
