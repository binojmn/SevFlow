ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-http
  hosts:
    - grafana.sevflow.app
  path: /
  pathType: Prefix
  tls:
    - secretName: grafana-sevflow-app-tls
      hosts:
        - grafana.sevflow.app

service:
  type: ClusterIP

adminUser: admin
