name: pr-fix-agent

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to inspect
        required: true
        type: string
      issue_summary:
        description: Short description of the PR issue to fix
        required: true
        type: string
      model:
        description: OpenAI model to use
        required: false
        default: gpt-4.1-mini
        type: string
      dry_run:
        description: Run the agent without pushing a branch or opening a PR
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/pr_fix_agent/requirements.txt
          pip install -r sevflow-app/requirements.txt

      - name: Run PR fix agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENAI_MODEL: ${{ inputs.model }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          EXTRA_ARGS=""
          if [ "$DRY_RUN" = "true" ]; then
            EXTRA_ARGS="--dry-run"
          fi

          python -m automation.pr_fix_agent.main \
            --pr-number "${{ inputs.pr_number }}" \
            --issue-summary "${{ inputs.issue_summary }}" \
            --repo-path . \
            --run-tests-command "python -m unittest discover -s sevflow-app/tests -p 'test_*.py'" \
            $EXTRA_ARGS
