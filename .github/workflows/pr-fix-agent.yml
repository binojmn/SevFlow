name: pr-fix-agent

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to inspect
        required: true
        type: string
      issue_summary:
        description: Short description of the PR issue to fix
        required: true
        type: string
      model:
        description: OpenAI model to use
        required: false
        default: gpt-4.1-mini
        type: string
      dry_run:
        description: Run the agent without pushing a branch or opening a PR
        required: false
        default: false
        type: boolean
  workflow_run:
    workflows:
      - sevflow-app-ci
    types:
      - completed

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  fix-pr:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.event == 'pull_request'
      )
    runs-on: ubuntu-latest

    outputs:
      pr_number: ${{ steps.resolve-context.outputs.pr_number }}
      issue_summary: ${{ steps.resolve-context.outputs.issue_summary }}
      model: ${{ steps.resolve-context.outputs.model }}
      dry_run: ${{ steps.resolve-context.outputs.dry_run }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve trigger context
        id: resolve-context
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_ISSUE_SUMMARY: ${{ inputs.issue_summary }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          event_name = os.environ["EVENT_NAME"]
          if event_name == "workflow_dispatch":
              pr_number = os.environ["INPUT_PR_NUMBER"]
              issue_summary = os.environ["INPUT_ISSUE_SUMMARY"]
              model = os.environ.get("INPUT_MODEL") or "gpt-4.1-mini"
              dry_run = (os.environ.get("INPUT_DRY_RUN") or "false").lower()
          else:
              with open(os.environ["EVENT_PATH"], "r", encoding="utf-8") as fh:
                  payload = json.load(fh)
              workflow_run = payload["workflow_run"]
              pull_requests = workflow_run.get("pull_requests") or []
              if not pull_requests:
                  print("No PR attached to failed workflow_run; skipping.", file=sys.stderr)
                  sys.exit(1)
              pr_number = str(pull_requests[0]["number"])
              head_branch = workflow_run.get("head_branch", "unknown-branch")
              issue_summary = (
                  f"Auto-fix failed sevflow-app-ci run {workflow_run['id']} "
                  f"for PR #{pr_number} on branch {head_branch}."
              )
              model = "gpt-4.1-mini"
              dry_run = "false"

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"pr_number={pr_number}\n")
              fh.write(f"issue_summary={issue_summary}\n")
              fh.write(f"model={model}\n")
              fh.write(f"dry_run={dry_run}\n")
          PY

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ steps.resolve-context.outputs.pr_number }}/head
          fetch-depth: 0
          token: ${{ secrets.GH_PUSH_TOKEN != '' && secrets.GH_PUSH_TOKEN || github.token }}
          persist-credentials: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/pr_fix_agent/requirements.txt
          pip install -r sevflow-app/requirements.txt

      - name: Run PR fix agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PUSH_TOKEN != '' && secrets.GH_PUSH_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENAI_MODEL: ${{ steps.resolve-context.outputs.model }}
          DRY_RUN: ${{ steps.resolve-context.outputs.dry_run }}
        run: |
          EXTRA_ARGS=""
          if [ "$DRY_RUN" = "true" ]; then
            EXTRA_ARGS="--dry-run"
          fi

          python -m automation.pr_fix_agent.main \
            --pr-number "${{ steps.resolve-context.outputs.pr_number }}" \
            --issue-summary "${{ steps.resolve-context.outputs.issue_summary }}" \
            --repo-path . \
            --run-tests-command "python -m unittest discover -s sevflow-app/tests -p 'test_*.py'" \
            $EXTRA_ARGS
