{{- $progressiveDelivery := .Values.progressiveDelivery | default dict }}
{{- if not ($progressiveDelivery.enabled | default false) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sevflow-app.fullname" . }}
  labels:
    {{- include "sevflow-app.labels" . | nindent 4 }}
{{- $strategy := .Values.deploymentStrategy | default dict }}
{{- $strategyType := $strategy.type | default "RollingUpdate" }}
{{- $rollingUpdate := $strategy.rollingUpdate | default dict }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sevflow-app.selectorLabels" . | nindent 6 }}
  strategy:
    type: {{ $strategyType }}
    {{- if eq $strategyType "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ $rollingUpdate.maxUnavailable | default 0 }}
      maxSurge: {{ $rollingUpdate.maxSurge | default 1 }}
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "sevflow-app.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: sevflow-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
              name: http
          env:
            - name: APP_ENV
              value: {{ .Values.env.appEnv | quote }}
            - name: APP_VERSION
              value: {{ .Values.env.appVersion | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
