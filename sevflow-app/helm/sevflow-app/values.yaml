replicaCount: 1

image:
  repository: 696155685144.dkr.ecr.us-east-1.amazonaws.com/sevflow-app
  tag: "set-by-ci"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

containerPort: 8080

env:
  appEnv: dev
  appVersion: "1.0.0"

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: ""
  path: /
  pathType: Prefix
  tls: []

resources: {}

ingress-nginx:
  enabled: false
  controller:
    service:
      type: LoadBalancer
